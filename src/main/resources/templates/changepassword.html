<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <style>
        :root {
            --ink: #1d2a2e;
            --muted: #617276;
            --line: #cbd7d9;
            --panel: #ffffff;
            --field: #f8fbfb;
            --accent: #0d6b63;
            --accent-strong: #084d48;
            --danger: #b42318;
            --success: #146c43;
            --wash: #e7f0ee;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
            background:
                    linear-gradient(135deg, rgba(13, 107, 99, 0.12), rgba(246, 196, 83, 0.14)),
                    repeating-linear-gradient(90deg, rgba(29, 42, 46, 0.04) 0, rgba(29, 42, 46, 0.04) 1px, transparent 1px, transparent 72px),
                    var(--wash);
        }

        main {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 40px 18px;
        }

        .shell {
            display: grid;
            width: min(980px, 100%);
            grid-template-columns: 0.85fr 1.15fr;
            overflow: hidden;
            border: 1px solid rgba(29, 42, 46, 0.14);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 24px 70px rgba(29, 42, 46, 0.16);
        }

        .intro {
            display: flex;
            min-height: 100%;
            flex-direction: column;
            justify-content: space-between;
            gap: 36px;
            padding: 42px;
            color: #f9f6ed;
            background:
                    linear-gradient(150deg, rgba(8, 77, 72, 0.96), rgba(13, 107, 99, 0.86)),
                    linear-gradient(45deg, transparent 45%, rgba(246, 196, 83, 0.24) 45%, rgba(246, 196, 83, 0.24) 55%, transparent 55%);
        }

        .intro h1 {
            margin: 0 0 16px;
            font-size: clamp(2rem, 4vw, 3.8rem);
            line-height: 0.95;
        }

        .intro p {
            max-width: 30ch;
            margin: 0;
            color: rgba(249, 246, 237, 0.84);
            font-family: "Segoe UI", Verdana, sans-serif;
            line-height: 1.6;
        }

        .badge {
            width: fit-content;
            border: 1px solid rgba(249, 246, 237, 0.38);
            border-radius: 999px;
            padding: 8px 14px;
            font-family: "Segoe UI", Verdana, sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .summary {
            display: grid;
            gap: 14px;
            padding: 18px;
            border: 1px solid rgba(29, 42, 46, 0.1);
            border-radius: 8px;
            background: rgba(248, 251, 251, 0.88);
            font-family: "Segoe UI", Verdana, sans-serif;
        }

        .summary span {
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .summary strong {
            display: block;
            margin-top: 3px;
            color: var(--ink);
            font-size: 1rem;
            line-height: 1.4;
        }

        .form-panel {
            padding: 42px;
        }

        .form-panel h2 {
            margin: 0 0 6px;
            font-size: 2rem;
            line-height: 1.1;
        }

        .form-panel > p {
            margin: 0 0 28px;
            color: var(--muted);
            font-family: "Segoe UI", Verdana, sans-serif;
        }

        form {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-family: "Segoe UI", Verdana, sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--field);
            color: var(--ink);
            font: 1rem "Segoe UI", Verdana, sans-serif;
            padding: 13px 14px;
            transition: border-color 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(13, 107, 99, 0.14);
        }

        .error {
            color: var(--danger);
            font-family: "Segoe UI", Verdana, sans-serif;
            font-size: 0.85rem;
        }

        .alert {
            border-radius: 6px;
            padding: 13px 14px;
            font-family: "Segoe UI", Verdana, sans-serif;
            font-size: 0.94rem;
        }

        .alert-success {
            border: 1px solid rgba(20, 108, 67, 0.24);
            background: rgba(20, 108, 67, 0.1);
            color: var(--success);
        }

        .alert-error {
            border: 1px solid rgba(180, 35, 24, 0.24);
            background: rgba(180, 35, 24, 0.08);
            color: var(--danger);
        }

        .help {
            margin: -8px 0 0;
            color: var(--muted);
            font-family: "Segoe UI", Verdana, sans-serif;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .actions a,
        button {
            cursor: pointer;
            border: 0;
            border-radius: 6px;
            background: var(--accent);
            color: #ffffff;
            font: 700 1rem "Segoe UI", Verdana, sans-serif;
            padding: 14px 18px;
            text-decoration: none;
            transition: background-color 160ms ease, transform 160ms ease;
        }

        .actions a {
            display: inline-flex;
            align-items: center;
        }

        .actions a:hover,
        button:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        .secondary {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--ink);
        }

        .secondary:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(13, 107, 99, 0.25);
            color: var(--accent-strong);
        }

        .links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .links a {
            color: var(--accent-strong);
            font-family: "Segoe UI", Verdana, sans-serif;
            font-size: 0.92rem;
            font-weight: 700;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 760px) {
            main { padding: 18px; }
            .shell { grid-template-columns: 1fr; }
            .intro, .form-panel { padding: 28px; }
            .intro { gap: 24px; }
        }
    </style>
</head>
<body>
<main>
    <section class="shell">
        <aside class="intro">
            <div>
                <div class="badge">Student account</div>
                <h1>Change password</h1>
                <p>Confirm your current password before setting a new one.</p>
            </div>

            <div class="summary" th:if="${user != null}">
                <div>
                    <span>Name</span>
                    <strong th:text="${user.fullName}">Student Name</strong>
                </div>
                <div>
                    <span>Email</span>
                    <strong th:text="${user.email}">student@example.com</strong>
                </div>
            </div>
        </aside>

        <section class="form-panel">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
            <h2>Your Password</h2>
            <p>Update the password for your student account.</p>

            <form th:action="@{/change-password}" th:object="${changePasswordForm}" method="post">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="field">
                    <label for="currentPassword">Current password</label>
                    <input id="currentPassword" type="password" th:field="*{currentPassword}" autocomplete="current-password" required>
                    <span class="error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
                </div>

                <div class="field">
                    <label for="newPassword">New password</label>
                    <input id="newPassword" type="password" th:field="*{newPassword}" autocomplete="new-password" required>
                    <span class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
                </div>

                <p class="help">Use at least 8 characters.</p>

                <div class="actions">
                    <button type="submit">Change password</button>
                    <a class="secondary" th:href="@{/dashboard}">Back to dashboard</a>
                </div>
            </form>

            <div class="links">
                <a th:href="@{/change-profile-info}">Change profile info</a>
            </div>
        </section>
    </section>
</main>
</body>
</html>
